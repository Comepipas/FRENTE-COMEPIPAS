<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Recuperar contraseña | Frente Comepipas</title><link rel="stylesheet" href="assets/css/variables.css"><link rel="stylesheet" href="assets/css/style.css"><link rel="stylesheet" href="assets/css/responsive.css"></head><body><main class="auth-page"><section class="auth-card"><div class="auth-brand"><img src="assets/images/brand/escudo-transparente.png" alt="Escudo"><span class="kicker">Área del socio</span><h1>Recuperar contraseña</h1><p>Introduce el correo vinculado con tu ficha.</p></div><form id="resetForm"><label>Correo<input type="email" name="email" required></label><label id="newPasswordLabel" hidden>Nueva contraseña<input type="password" name="password" minlength="8"></label><button class="btn btn-primary" type="submit" style="width:100%">Enviar enlace</button><p id="resetMessage" class="v11-form-message"></p></form><a href="socios.html">Volver al acceso</a></section></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="assets/js/supabase-config.js"></script><script src="assets/js/supabase-client.js"></script><script src="assets/js/member-auth-v171.js"></script><script>document.addEventListener('DOMContentLoaded',async()=>{const f=document.getElementById('resetForm'),m=document.getElementById('resetMessage'),label=document.getElementById('newPasswordLabel');const c=await MemberAuth.client();const recovery=location.hash.includes('type=recovery')||location.search.includes('type=recovery');if(recovery){label.hidden=false;f.email.closest('label').hidden=true;f.querySelector('button').textContent='Guardar nueva contraseña';}f.addEventListener('submit',async e=>{e.preventDefault();try{if(recovery){const {error}=await c.auth.updateUser({password:f.password.value});if(error)throw error;m.textContent='Contraseña actualizada. Ya puedes iniciar sesión.';}else{await MemberAuth.resetPassword(f.email.value.trim());m.textContent='Te hemos enviado un enlace si el correo existe en el sistema.';}}catch(err){m.textContent=err.message;}});});</script></body></html>
