<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Centro documental | Administración</title><link rel="stylesheet" href="assets/css/variables.css"><link rel="stylesheet" href="assets/css/style.css"><link rel="stylesheet" href="assets/css/responsive.css"><link rel="stylesheet" href="assets/css/documents-v21.css"><script src="assets/js/roles.js"></script><script src="assets/js/auth-bootstrap-v13.3.js"></script><script>if(!protectAdminPage('dashboard'))throw new Error('Acceso bloqueado');</script></head><body><main class="admin-page"><section class="container d21-shell"><div class="d21-toolbar"><div><span class="kicker">Commit 21 · Supabase Storage</span><h1>Centro documental</h1><p>Documentos públicos, para socios o exclusivos de administración. Versiones y aceptaciones registradas.</p></div><div class="d21-actions"><a class="btn btn-dark-outline" href="admin.html">Volver</a><button id="d21Categories" class="btn btn-dark-outline">Categorías</button><button id="d21Acceptances" class="btn btn-dark-outline">Aceptaciones</button><button id="d21New" class="btn btn-primary">Nuevo documento</button></div></div><div id="d21Kpis" class="d21-kpis"></div><div class="d21-filters"><input id="d21Search" type="search" placeholder="Buscar por título, temporada o etiqueta"><select id="d21CategoryFilter"><option value="">Todas las categorías</option></select><select id="d21Visibility"><option value="">Toda visibilidad</option><option value="publico">Público</option><option value="socios">Socios</option><option value="administradores">Administradores</option></select></div><div id="d21Grid" class="d21-grid"></div></section></main>
<dialog id="d21Dialog" class="d21-dialog"><form id="d21Form"><h2 id="d21DialogTitle">Documento</h2><input type="hidden" name="id"><div class="d21-form"><label>Título<input name="titulo" required></label><label>Categoría<select name="category_id"></select></label><label class="full">Descripción<textarea name="descripcion" rows="3"></textarea></label><label>Temporada<input name="temporada" placeholder="2026/27"></label><label>Etiquetas<input name="etiquetas" placeholder="estatutos, viaje, menores"></label><label>Visibilidad<select name="visibilidad"><option value="publico">Público</option><option value="socios" selected>Solo socios</option><option value="administradores">Solo administradores</option></select></label><label>Estado<select name="estado"><option value="publicado">Publicado</option><option value="borrador">Borrador</option><option value="archivado">Archivado</option></select></label><label>Vigente desde<input name="vigente_desde" type="date"></label><label>Vigente hasta<input name="vigente_hasta" type="date"></label><label>Orden<input name="orden" type="number" value="100"></label><label><input name="destacado" type="checkbox"> Destacado</label><label class="full"><input name="requiere_aceptacion" type="checkbox"> Requiere aceptación expresa del socio</label><label class="full">Archivo o nueva versión (máx. 25 MB)<input name="file" type="file" accept=".pdf,.doc,.docx,.xls,.xlsx,.csv,.txt,.jpg,.jpeg,.png,.webp"></label><label class="full">Notas de esta versión<textarea name="notas_version" rows="2"></textarea></label></div><div class="d21-actions"><button type="button" class="btn btn-dark-outline" onclick="this.closest('dialog').close()">Cancelar</button><button type="submit" class="btn btn-primary">Guardar</button></div></form></dialog>
<dialog id="d21AcceptanceDialog" class="d21-dialog"><form method="dialog"><h2>Aceptaciones registradas</h2><div class="d21-table-wrap"><table class="d21-table"><thead><tr><th>Documento</th><th>Socio</th><th>Fecha</th></tr></thead><tbody id="d21AcceptanceBody"></tbody></table></div><div class="d21-actions"><button class="btn btn-primary">Cerrar</button></div></form></dialog><div class="toast"></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="assets/js/supabase-config.js"></script><script src="assets/js/supabase-client.js?v=21"></script><script src="assets/js/documents-v21.js"></script><script src="assets/js/documents-admin-v21.js"></script></body></html>
