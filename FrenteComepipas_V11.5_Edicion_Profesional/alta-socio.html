<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hazte socio | Frente Comepipas</title><link rel="stylesheet" href="assets/css/variables.css"><link rel="stylesheet" href="assets/css/style.css"><link rel="stylesheet" href="assets/css/responsive.css"></head><body><main class="auth-page"><section class="auth-card v11-wide-card"><div class="auth-brand"><img src="assets/images/brand/escudo-transparente.png" alt="Escudo"><span class="kicker">Nueva solicitud</span><h1>Hazte socio de la peña</h1><p>La directiva revisará la solicitud antes de asignar un número de socio.</p></div><form id="joinForm" class="v11-two-col"><label>Nombre<input name="name" required></label><label>Apellidos<input name="surname" required></label><label>DNI<input name="dni" required></label><label>Fecha de nacimiento<input type="date" name="birthdate" required></label><label>Teléfono<input type="tel" name="phone" required></label><label>Correo electrónico<input type="email" name="email" required></label><label class="v11-full">Observaciones<textarea name="notes" rows="4"></textarea></label><label class="v11-full v11-check"><input type="checkbox" required> Acepto que mis datos sean revisados para tramitar la solicitud.</label><button class="btn btn-primary v11-full" type="submit">Enviar solicitud</button><p id="joinMessage" class="v11-form-message v11-full"></p></form><a href="index.html">Volver al inicio</a></section></main><script>document.getElementById('joinForm').addEventListener('submit',e=>{e.preventDefault();document.getElementById('joinMessage').textContent='Solicitud preparada. El envío real se habilitará al conectar Supabase.'})</script></body></html>
