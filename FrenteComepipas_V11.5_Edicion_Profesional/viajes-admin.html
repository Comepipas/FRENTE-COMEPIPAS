<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Viajes | Administración</title><link rel="stylesheet" href="assets/css/variables.css"><link rel="stylesheet" href="assets/css/style.css"><link rel="stylesheet" href="assets/css/responsive.css"><link rel="stylesheet" href="assets/css/travel-v19.css"><script src="assets/js/roles.js"></script><script src="assets/js/auth-bootstrap-v13.3.js"></script><script>if(!protectAdminPage("viajes")){throw new Error("Acceso bloqueado");}</script></head><body><main class="section"><div class="container"><div class="travel-actions"><a class="btn btn-secondary" href="admin.html">Volver</a><button id="newTravel" class="btn btn-primary">Crear viaje</button><button id="exportTravel" class="btn btn-gold">Exportar viajeros</button></div><h1>Viajes y reservas</h1><p id="travelStatus">Cargando datos desde Supabase…</p><section id="travelKpis" class="travel-kpis"></section><h2>Viajes</h2><div id="travelCards" class="travel-grid"></div><h2 style="margin-top:32px">Reservas</h2><div class="travel-table-wrap"><table class="travel-table"><thead><tr><th>Socio</th><th>Viaje</th><th>Plazas</th><th>Estado</th><th>Pago</th><th>Importe</th><th></th></tr></thead><tbody id="travelBookings"></tbody></table></div></div></main><div id="travelModal" class="travel-modal"><form id="travelForm" class="travel-dialog"><button type="button" data-close style="float:right">×</button><h2>Viaje</h2><input type="hidden" name="id"><div class="travel-form"><label>Título<input name="titulo" required></label><label>Destino<input name="destino" required></label><label>Salida<input type="datetime-local" name="fecha_salida" required></label><label>Regreso<input type="datetime-local" name="fecha_regreso"></label><label class="full">Punto de salida<input name="punto_salida"></label><label>Precio socio<input type="number" step=".01" min="0" name="precio_socio" value="0"></label><label>Precio acompañante<input type="number" step=".01" min="0" name="precio_acompanante" value="0"></label><label>Plazas totales<input type="number" min="1" name="plazas_totales" value="50"></label><label>Máximo por socio<input type="number" min="1" name="max_plazas_por_socio" value="1"></label><label>Apertura<input type="datetime-local" name="apertura"></label><label>Cierre<input type="datetime-local" name="cierre"></label><label>Estado<select name="estado"><option>borrador</option><option>abierto</option><option>completo</option><option>cerrado</option><option>finalizado</option><option>cancelado</option></select></label><label><span>Visible</span><input type="checkbox" name="visible" checked></label><label class="full">Descripción<textarea name="descripcion"></textarea></label><label class="full">Instrucciones de pago<textarea name="instrucciones_pago"></textarea></label></div><div class="travel-actions"><button class="btn btn-primary">Guardar</button></div></form></div><div id="bookingModal" class="travel-modal"><form id="bookingForm" class="travel-dialog"><button type="button" data-close style="float:right">×</button><h2>Gestionar reserva</h2><input type="hidden" name="id"><div class="travel-form"><label>Estado<select name="estado"><option>pendiente</option><option>confirmada</option><option>lista_espera</option><option>cancelada</option><option>rechazada</option><option>finalizada</option></select></label><label>Pago<select name="estado_pago"><option>pendiente</option><option>parcial</option><option>pagado</option><option>devuelto</option></select></label><label>Pagado<input type="number" step=".01" min="0" name="importe_pagado"></label><label>Método<input name="metodo_pago"></label><label class="full">Referencia<input name="referencia_pago"></label><label class="full">Observaciones<textarea name="observaciones_admin"></textarea></label></div><button class="btn btn-primary">Guardar</button></form></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="assets/js/supabase-config.js"></script><script src="assets/js/supabase-client.js"></script><script src="assets/js/travel-service-v19.js"></script><script src="assets/js/travel-admin-v19.js"></script></body></html>
