<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Solicitudes de entradas | Administración</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/css/variables.css"><link rel="stylesheet" href="assets/css/style.css"><link rel="stylesheet" href="assets/css/responsive.css"></head><body><main class="admin-page"><section class="admin-layout"><aside class="admin-sidebar"><h2>Entradas</h2><p>Gestión exclusiva de socios</p><a class="btn btn-gold" href="admin.html">Volver al panel</a><button class="v113-help" data-help="La solicitud no es una venta ni una reserva garantizada. La directiva asigna las entradas cuando el club confirma la disponibilidad.">?</button></aside><div class="admin-content"><div class="members-topbar"><div><span class="kicker">Módulo V11.3</span><h1>Solicitudes de entradas</h1></div><div class="members-topbar-actions"><button id="newEntryRequest" class="btn btn-primary">Nueva solicitud manual</button><button id="exportEntryRequests" class="btn btn-dark-outline">Exportar CSV</button></div></div>
<section class="trip-admin-stats"><div class="trip-admin-stat"><span>Recibidas</span><strong id="erTotal">0</strong></div><div class="trip-admin-stat"><span>Pendientes del club</span><strong id="erPending">0</strong></div><div class="trip-admin-stat"><span>Entradas solicitadas</span><strong id="erTickets">0</strong></div><div class="trip-admin-stat"><span>Asignadas</span><strong id="erAssigned">0</strong></div></section>
<section class="trip-admin-section"><div class="trip-admin-toolbar"><h2>Solicitudes</h2><div><input id="entryAdminSearch" type="search" placeholder="Socio, número o partido"><select id="entryAdminStatus"><option>Todos</option><option>Solicitud recibida</option><option>Pendiente del club</option><option>Asignada completamente</option><option>Asignada parcialmente</option><option>No asignada</option><option>Pagada</option><option>Entregada</option><option>Cancelada</option></select></div></div><div class="store-admin-table-wrap"><table class="store-admin-table"><thead><tr><th>Socio</th><th>Partido</th><th>Solicitadas</th><th>Concedidas</th><th>Estado</th><th>Pago</th><th>Acciones</th></tr></thead><tbody id="entryRequestsAdminBody"></tbody></table></div></section></div></section></main>
<div id="entryAdminModal" class="store-modal"><div class="store-modal-dialog"><button class="store-modal-close">×</button><h2>Gestionar solicitud</h2><form id="entryAdminForm" class="store-form-grid"><input type="hidden" name="id"><label>N.º socio<input name="numeroSocio" required></label><label>Nombre<input name="nombre" required></label><label class="full">Partido<input name="partido" value="Málaga CF - Atlético de Madrid" required></label><label>Solicitadas<input name="cantidad" type="number" min="1" required></label><label>Concedidas<input name="concedidas" type="number" min="0" value="0"></label><label>Estado<select name="estado"><option>Solicitud recibida</option><option>Pendiente del club</option><option>Asignada completamente</option><option>Asignada parcialmente</option><option>No asignada</option><option>Pagada</option><option>Entregada</option><option>Cancelada</option></select></label><label>Pago<select name="pago"><option>Pendiente</option><option>Pagado</option><option>No procede</option></select></label><label class="full">Observaciones<textarea name="observaciones" rows="3"></textarea></label><button class="btn btn-primary full" type="submit">Guardar solicitud</button></form></div></div><div class="toast"></div><script src="assets/js/entry-requests-admin.js"></script></body></html>
