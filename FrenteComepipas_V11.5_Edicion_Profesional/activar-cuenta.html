<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Activar cuenta | Frente Comepipas</title><link rel="stylesheet" href="assets/css/variables.css"><link rel="stylesheet" href="assets/css/style.css"><link rel="stylesheet" href="assets/css/responsive.css"></head><body><main class="auth-page"><section class="auth-card"><div class="auth-brand"><img src="assets/images/brand/escudo-transparente.png" alt="Escudo"><span class="kicker">Socios actuales</span><h1>Activar mi cuenta</h1><p>Activa el registro que ya tiene la peña. No crearás un socio duplicado.</p></div><form id="activationForm"><label>Número de socio<input name="memberNumber" required></label><label>DNI o teléfono<input name="verification" required></label><label>Correo electrónico<input type="email" name="email" required></label><label>Crear contraseña<input type="password" name="password" minlength="8" required></label><button class="btn btn-primary" type="submit" style="width:100%">Solicitar activación</button><p id="activationMessage" class="v11-form-message"></p></form><a href="socios.html">Volver al acceso de socios</a></section></main><script>document.getElementById('activationForm').addEventListener('submit',e=>{e.preventDefault();document.getElementById('activationMessage').textContent='Solicitud preparada. La activación real se habilitará al conectar la base de datos de socios.'})</script></body></html>
