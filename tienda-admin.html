<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Material y solicitudes | Administración</title><link rel="stylesheet" href="assets/css/variables.css"><link rel="stylesheet" href="assets/css/style.css"><link rel="stylesheet" href="assets/css/responsive.css"><link rel="stylesheet" href="assets/css/material-v20.css"><script src="assets/js/roles.js"></script><script src="assets/js/auth-bootstrap-v13.3.js"></script><script>if(!protectAdminPage('tienda'))throw new Error('Acceso bloqueado');</script></head><body><main class="admin-page"><section class="container m20-shell" style="padding-block:1.5rem"><div class="m20-toolbar"><div><span class="kicker">Commit 20 · Supabase</span><h1>Material y solicitudes</h1><p>Catálogo informativo. Sin carrito, venta ni pago virtual.</p></div><div class="m20-actions"><a class="btn btn-dark-outline" href="admin.html">Volver</a><a class="btn btn-dark-outline" href="tienda.html">Ver catálogo</a><button id="m20Export" class="btn btn-dark-outline">Exportar CSV</button><button id="m20New" class="btn btn-primary">Nuevo material</button></div></div><div id="m20Kpis" class="m20-kpis"></div><div class="m20-tabs"><button class="active" data-tab="catalog">Catálogo</button><button data-tab="requests">Solicitudes</button></div><section id="m20CatalogPanel" class="m20-panel active"><div class="m20-toolbar"><input id="m20ItemSearch" type="search" placeholder="Buscar material"><select id="m20ItemAvailability"><option value="">Toda disponibilidad</option><option>Disponible</option><option>Consultar</option><option>Lista abierta</option><option>No disponible</option></select></div><div id="m20AdminGrid" class="m20-grid"></div></section><section id="m20RequestsPanel" class="m20-panel"><div class="m20-toolbar"><input id="m20RequestSearch" type="search" placeholder="Nombre, teléfono, referencia..."><select id="m20RequestStatus"><option value="">Todos los estados</option><option>Pendiente</option><option>Contactado</option><option>Reservado</option><option>Entregado</option><option>Cancelado</option></select></div><div class="m20-table-wrap"><table class="m20-table"><thead><tr><th>Solicitud</th><th>Persona</th><th>Material</th><th>Contacto</th><th>Estado</th><th>Acción</th></tr></thead><tbody id="m20RequestsBody"></tbody></table></div></section></section></main>
<dialog id="m20ItemDialog" class="m20-dialog"><form method="dialog" id="m20ItemForm"><h2>Material del catálogo</h2><input name="id" type="hidden"><input name="imagen_path" type="hidden"><input name="imagen_url" type="hidden"><div class="m20-form"><label>Nombre<input name="nombre" required></label><label>Categoría<select name="categoria_id"></select></label><label class="full">Descripción<textarea name="descripcion" rows="3"></textarea></label><label>Disponibilidad<select name="disponibilidad"><option>Disponible</option><option>Consultar</option><option>Lista abierta</option><option>No disponible</option></select></label><label>Unidades orientativas<input name="unidades_orientativas" type="number" min="0" value="0"></label><label>Emoji<input name="emoji" value="📦"></label><label>Variantes / tallas<input name="variantes"></label><label>Orden<input name="orden" type="number" value="100"></label><label>Fotografía<input name="foto" type="file" accept="image/*"></label><label class="full">Notas internas<textarea name="observaciones_internas"></textarea></label><label><input name="visible" type="checkbox" checked> Visible</label><label><input name="destacado" type="checkbox"> Destacado</label></div><div class="m20-actions"><button value="cancel" class="btn btn-dark-outline">Cancelar</button><button value="default" class="btn btn-primary">Guardar</button></div></form></dialog>
<dialog id="m20ManageDialog" class="m20-dialog"><form method="dialog" id="m20ManageForm"><h2>Gestionar solicitud</h2><input name="id" type="hidden"><div id="m20RequestDetail"></div><div class="m20-form"><label>Estado<select name="estado"><option>Pendiente</option><option>Contactado</option><option>Reservado</option><option>Entregado</option><option>Cancelado</option></select></label><label class="full">Respuesta / indicaciones<textarea name="nota_respuesta" rows="4" placeholder="Ej.: Disponible para recoger en la previa del Málaga–Oviedo. Pago en efectivo."></textarea></label></div><div class="m20-actions"><button value="cancel" class="btn btn-dark-outline">Cancelar</button><button value="default" class="btn btn-primary">Guardar</button></div></form></dialog>
