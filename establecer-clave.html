<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Crear contraseña | Frente Comepipas</title><link rel="stylesheet" href="assets/css/variables.css"><link rel="stylesheet" href="assets/css/style.css"><link rel="stylesheet" href="assets/css/responsive.css"><link rel="stylesheet" href="assets/css/member-auth-v171.css"></head><body><main class="auth-page"><section class="auth-card"><div class="auth-brand"><img src="assets/images/brand/escudo-transparente.png" alt="Escudo"><span class="kicker">Invitación de la peña</span><h1>Crear mi contraseña</h1><p>Elige una contraseña segura para completar tu acceso.</p></div><form id="setPasswordForm"><label>Nueva contraseña<div class="password-field"><input id="newPassword" type="password" name="password" minlength="8" autocomplete="new-password" required><button type="button" class="password-toggle" data-toggle-password="newPassword">Ver</button></div></label><label>Confirmar contraseña<div class="password-field"><input id="newPasswordConfirm" type="password" name="passwordConfirm" minlength="8" autocomplete="new-password" required><button type="button" class="password-toggle" data-toggle-password="newPasswordConfirm">Ver</button></div></label><div class="password-rules" id="passwordRules"><strong>La contraseña debe incluir:</strong><span data-rule="length">○ 8 caracteres como mínimo</span><span data-rule="upper">○ una letra mayúscula</span><span data-rule="lower">○ una letra minúscula</span><span data-rule="number">○ un número</span><span data-rule="match">○ las dos contraseñas deben coincidir</span><div class="password-strength"><i id="passwordStrengthBar"></i></div><small id="passwordStrengthText">Seguridad: pendiente</small></div><button id="setPasswordSubmit" class="btn btn-primary" type="submit" style="width:100%" disabled>Guardar contraseña</button><p id="setPasswordMessage" class="v11-form-message" role="status"></p></form></section></main><
